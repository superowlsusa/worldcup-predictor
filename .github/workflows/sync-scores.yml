name: Sync World Cup scores

# Feeds final scores into Supabase, which recalculates the league table.
#
# Auto-runs every 15 minutes, but ONLY during the 2026 World Cup window
# (11 Jun – 19 Jul, UTC). Outside those dates GitHub never triggers it, so it
# switches itself on at the tournament start and off after the final — nothing
# to enable or disable by hand.
on:
  schedule:
    - cron: '*/15 * 11-30 6 *'   # June 11–30
    - cron: '*/15 * 1-19 7 *'    # July 1–19
  workflow_dispatch: {} # also lets you run it manually any time from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync scores
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/sync-scores.mjs
