name: Sync World Cup scores

# Feeds final scores into Supabase, which recalculates the league table.
#
# The automatic 15-minute schedule is PAUSED until the tournament starts.
# To turn it on (do this once the secrets below are set, near June 11):
#   1. Add repo secrets: SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY, FOOTBALL_DATA_TOKEN
#   2. Uncomment the two `schedule:` lines below.
on:
  # schedule:
  #   - cron: '*/15 * * * *'
  workflow_dispatch: {} # lets you run it manually from the Actions tab

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync scores
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/sync-scores.mjs
