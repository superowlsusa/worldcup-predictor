name: Sync World Cup scores

# Feeds final scores into Supabase, which recalculates the league table.
#
# Runs every 15 minutes. When no match has just finished it's a harmless no-op
# (logs "scored: 0"), so it's safe to leave running year-round — and this avoids
# any dependency on date-range timing, which made scheduled runs unreliable.
on:
  schedule:
    - cron: '*/15 * * * *'
  workflow_dispatch: {} # also lets you run it manually any time from the Actions tab

# Run the checkout/setup-node actions on Node 24 (they default to the now-deprecated
# Node 20 runtime). Silences GitHub's deprecation warning without changing versions.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Sync scores
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FOOTBALL_DATA_TOKEN: ${{ secrets.FOOTBALL_DATA_TOKEN }}
        run: node scripts/sync-scores.mjs
